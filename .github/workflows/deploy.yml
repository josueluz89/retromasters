name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 129.213.87.227
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/crmx
            git init -q
            git remote add origin https://github.com/josueluz89/retromasters.git 2>/dev/null || git remote set-url origin https://github.com/josueluz89/retromasters.git
            git fetch origin master
            git reset --hard origin/master
            npm install --production
            rm -f cache-channels.json
            BASE_URL=https://masterstv.129.213.87.227.sslip.io/crmx pm2 restart crmx --update-env || BASE_URL=https://masterstv.129.213.87.227.sslip.io/crmx pm2 start server.js --name crmx
